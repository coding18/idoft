name: Verify Flaky Test - Flink CEPOperatorTest

on:
  workflow_dispatch:  # lets you trigger it manually with a button

jobs:
  verify-flaky:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Clone Apache Flink at the detected commit
        run: |
          git clone https://github.com/apache/flink.git
          cd flink
          git checkout 23c9b5ac50d04d28a34a87c78eb2d3331c06b74b

      - name: Build the flink-cep module (skip tests)
        run: |
          cd flink
          mvn clean install -DskipTests -pl flink-libraries/flink-cep -am \
            -Drat.skip=true -Dcheckstyle.skip=true
        timeout-minutes: 30

      - name: Run test normally (should PASS)
        run: |
          cd flink
          mvn -pl flink-libraries/flink-cep test \
            -Dtest=org.apache.flink.cep.operator.CEPOperatorTest#testCEPOperatorComparatorEventTime \
            -Drat.skip=true -Dcheckstyle.skip=true
        continue-on-error: true

      - name: Run test with NonDex (should FAIL)
        run: |
          cd flink
          mvn -pl flink-libraries/flink-cep \
            edu.illinois:nondex-maven-plugin:2.1.1:nondex \
            -Dtest=org.apache.flink.cep.operator.CEPOperatorTest#testCEPOperatorComparatorEventTime \
            -DnondexRuns=10 \
            -Drat.skip=true -Dcheckstyle.skip=true
        continue-on-error: true
