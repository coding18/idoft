name: Verify Flaky Test - NiFi LdapUserGroupProviderTest

on:
  workflow_dispatch:

jobs:
  verify-flaky:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Clone Apache NiFi at detected commit
        run: |
          git clone https://github.com/apache/nifi.git
          cd nifi
          git checkout 2bd752d868a8f3e36113b078bb576cf054e945e8

      - name: Build the module and dependencies (skip tests)
        run: |
          cd nifi
          mvn clean install -DskipTests \
            -pl nifi-registry/nifi-registry-core/nifi-registry-framework \
            -am \
            -Drat.skip=true \
            -Dcheckstyle.skip=true \
            -Dlicense.skip=true \
            --no-transfer-progress
        timeout-minutes: 45

      - name: Run test normally (should PASS)
        run: |
          cd nifi
          mvn -pl nifi-registry/nifi-registry-core/nifi-registry-framework test \
            -Dtest=org.apache.nifi.registry.security.ldap.tenants.LdapUserGroupProviderTest#testUserIdentityMappingWithTransforms \
            -Drat.skip=true \
            -Dcheckstyle.skip=true \
            --no-transfer-progress
        continue-on-error: true

      - name: Run test with NonDex (should FAIL)
        run: |
          cd nifi
          mvn -pl nifi-registry/nifi-registry-core/nifi-registry-framework \
            edu.illinois:nondex-maven-plugin:2.1.1:nondex \
            -Dtest=org.apache.nifi.registry.security.ldap.tenants.LdapUserGroupProviderTest#testUserIdentityMappingWithTransforms \
            -DnondexRuns=10 \
            -Drat.skip=true \
            -Dcheckstyle.skip=true \
            --no-transfer-progress
        continue-on-error: true
